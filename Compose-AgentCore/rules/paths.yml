# paths.yml
# Rules de cambios por path para evitar correr pipelines innecesarios.

.changes_agents:
  rules:
    - changes:
        - "agents/**/*"

.changes_mcp:
  rules:
    - changes:
        - "mcp/**/*"

.changes_tools:
  rules:
    - changes:
        - "tools/**/*"

.changes_foundation:
  rules:
    - changes:
        - "foundation/**/*"

.changes_workload_or_compose:
  rules:
    - changes:
        - "agents/**/*"
        - "mcp/**/*"
        - "tools/**/*"
