# pipeline_deploy_agents_minimal.yml
# Variante REDUCIDA del pipeline de despliegue de agentes — para Fase 1 del rollout.
#
# QUÉ INCLUYE:  validate_manifest, package_artifact, build_image, render_tfvars, trigger_iac, smoke_test
# QUÉ NO:       validate_structure, apply_policy, publish_prompt, scan_image, pipeline_telemetry
#
# Usar este pipeline mientras los componentes opcionales aún NO se han creado/publicado.
# Migrar a pipeline_deploy_agents.yml cuando todos los componentes existan en el group GitLab.
#
# Limitaciones conscientes de Fase 1:
#  - Sin Cedar policies (gateway_policies del manifest se ignoran).
#  - Sin runtime_iam custom (todos los workloads usan default_role_arn compartido).
#  - Sin prompts versionados via Bedrock Prompt Management (deben hardcodearse temporalmente).
#  - Sin scan de vulnerabilidades en la imagen (se hace en Fase 2).
#  - Sin trace ID cross-pipeline (telemetría manual via logs de GitLab UI).

stages:
  - validate
  - package
  - build
  - render
  - deploy
  - smoke

include:
  - local: rules/branch-to-env.yml
  - local: rules/paths.yml
  - local: variables/env-dev.yml
  - local: variables/env-qa.yml
  - local: variables/env-prd.yml

  - component: $CI_SERVER_FQDN/Componentes/agentcore/validate_manifest@main
    inputs:
      job_name: validate-manifest
      stage: validate
      image_runner: $IMAGE_BASE
      manifest_path: $WORKLOAD_PATH/manifest.yaml

  - component: $CI_SERVER_FQDN/Componentes/agentcore/package_artifact@main
    inputs:
      job_name: package-artifact
      stage: package
      image_runner: $IMAGE_BASE
      workload_path: $WORKLOAD_PATH
      capability: $CAPABILITY
      name: $WORKLOAD_NAME
      kind: agents
      environment: $ENVIRONMENT
      s3_bucket: $S3_ARTIFACTS_BUCKET

  - component: $CI_SERVER_FQDN/Componentes/agentcore/build_image@main
    inputs:
      job_name: build-image
      stage: build
      image_runner: $IMAGE_BASE
      workload_path: $WORKLOAD_PATH
      ecr_repo: agentcore-agents-${CAPABILITY}-${WORKLOAD_NAME}
      environment: $ENVIRONMENT

  - component: $CI_SERVER_FQDN/Componentes/agentcore/render_tfvars@main
    inputs:
      job_name: render-tfvars
      stage: render
      image_runner: $IMAGE_BASE
      manifest_path: $WORKLOAD_PATH/manifest.yaml
      environment: $ENVIRONMENT

  - component: $CI_SERVER_FQDN/Componentes/agentcore/trigger_iac@main
    inputs:
      job_name: trigger-iac
      stage: deploy
      image_runner: $IMAGE_BASE
      target_project: $TARGET_IAC_PROJECT
      environment: $ENVIRONMENT

default:
  tags: [devsecops-common]
  interruptible: true

workflow:
  rules:
    - !reference [.rule_branch_dev, rules]
    - !reference [.rule_branch_qa, rules]
    - !reference [.rule_branch_prd, rules]
