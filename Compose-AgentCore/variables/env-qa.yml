# env-qa.yml — defaults para ambiente QA.

.env_qa_vars:
  variables:
    ENVIRONMENT: "qa"
    AWS_REGION: "us-east-1"
    IMAGE_BASE: "$ORG_RUNNER_IMAGE"
    S3_ARTIFACTS_BUCKET: "artifacts-qa-agentcore-agents"
    S3_ARTIFACTS_BUCKET_MCP: "artifacts-qa-agentcore-mcp"
    S3_ARTIFACTS_BUCKET_TOOLS: "artifacts-qa-agentcore-tools"
    ECR_REGISTRY_PATTERN: "${AWS_ACCOUNT_ID_QA}.dkr.ecr.us-east-1.amazonaws.com"
    AWS_ROLE_ARN: "$AWS_ROLE_ARN_QA"
