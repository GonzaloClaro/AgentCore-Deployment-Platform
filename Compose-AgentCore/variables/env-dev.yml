# env-dev.yml — defaults para ambiente DEV.
# Las variables sensibles (AWS_ROLE_ARN_DEV, GITLAB_TOKEN_READ_API) son CI variables protegidas.

.env_dev_vars:
  variables:
    ENVIRONMENT: "dev"
    AWS_REGION: "us-east-1"
    IMAGE_BASE: "$ORG_RUNNER_IMAGE"
    S3_ARTIFACTS_BUCKET: "artifacts-dev-agentcore-agents"
    S3_ARTIFACTS_BUCKET_MCP: "artifacts-dev-agentcore-mcp"
    S3_ARTIFACTS_BUCKET_TOOLS: "artifacts-dev-agentcore-tools"
    ECR_REGISTRY_PATTERN: "${AWS_ACCOUNT_ID_DEV}.dkr.ecr.us-east-1.amazonaws.com"
    AWS_ROLE_ARN: "$AWS_ROLE_ARN_DEV"
