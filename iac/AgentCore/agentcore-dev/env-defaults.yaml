# env-defaults.yaml — valores por defecto para la cuenta dev-agenticplatform.
# Consumido por render_tfvars en el pipeline upstream.
# Los IDs reales se completan al crear las cuentas; mientras tanto, placeholders.

environment: "dev"
aws_region: "us-east-1"
account_id: "REPLACE_WITH_DEV_ACCOUNT_ID"

vpc_id: "REPLACE_WITH_DEV_VPC_ID"
subnet_ids:
  - "REPLACE_WITH_SUBNET_A"
  - "REPLACE_WITH_SUBNET_B"

kms_key_arn: "arn:aws:kms:us-east-1:REPLACE_WITH_DEV_ACCOUNT_ID:alias/agentcore-dev-artifacts"
default_role_arn: "arn:aws:iam::REPLACE_WITH_DEV_ACCOUNT_ID:role/agentcore-dev-runtime-execution"

# IDs de los 3 default gateways (output de foundation/default-gateways)
default_gateway_ids:
  oauth_3lo: "REPLACE_WITH_GW_3LO_ID"
  oauth_2lo: "REPLACE_WITH_GW_2LO_ID"
  sigv4_m2m: "REPLACE_WITH_GW_SIGV4_ID"

# Buckets de artefactos por tipo
s3_artifact_buckets:
  agents: "artifacts-dev-agentcore-agents"
  mcp: "artifacts-dev-agentcore-mcp"
  tools: "artifacts-dev-agentcore-tools"
