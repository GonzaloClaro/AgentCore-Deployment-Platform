# env-prd.yml — defaults para ambiente PRD.

.env_prd_vars:
  variables:
    ENVIRONMENT: "prd"
    AWS_REGION: "us-east-1"
    IMAGE_BASE: "$ORG_RUNNER_IMAGE"
    S3_ARTIFACTS_BUCKET: "artifacts-prd-agentcore-agents"
    S3_ARTIFACTS_BUCKET_MCP: "artifacts-prd-agentcore-mcp"
    S3_ARTIFACTS_BUCKET_TOOLS: "artifacts-prd-agentcore-tools"
    ECR_REGISTRY_PATTERN: "${AWS_ACCOUNT_ID_PRD}.dkr.ecr.us-east-1.amazonaws.com"
    AWS_ROLE_ARN: "$AWS_ROLE_ARN_PRD"
