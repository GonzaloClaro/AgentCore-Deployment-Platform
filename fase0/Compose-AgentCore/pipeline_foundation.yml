# pipeline_foundation.yml
# Bootstrap por cuenta + 3 default gateways. Se dispara solo cuando cambian foundation/**.
# Aplicar con cuidado, manual approval para QA y PRD.

stages:
  - plan
  - apply

include:
  - local: variables/env-dev.yml
  - local: variables/env-qa.yml
  - local: variables/env-prd.yml
  - local: rules/branch-to-env.yml
  - local: rules/paths.yml
  - local: rules/approvals.yml

.foundation_base:
  image: hashicorp/terraform:1.7
  variables:
    TF_ROOT: "foundation"
    TF_STATE_NAME: "agentcore-${ENVIRONMENT}-foundation"
  before_script:
    - cd "$TF_ROOT"
    - terraform init
      -backend-config="address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}"
      -backend-config="lock_address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}/lock"
      -backend-config="unlock_address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}/lock"
      -backend-config="username=gitlab-ci-token"
      -backend-config="password=${CI_JOB_TOKEN}"
      -backend-config="lock_method=POST"
      -backend-config="unlock_method=DELETE"

foundation-plan:
  extends: .foundation_base
  stage: plan
  rules:
    - !reference [.changes_foundation, rules]
  script:
    - terraform plan -out=plan.tfplan -var="environment=${ENVIRONMENT}"
  artifacts:
    paths:
      - $TF_ROOT/plan.tfplan

foundation-apply:
  extends: .foundation_base
  stage: apply
  needs: [foundation-plan]
  rules:
    - !reference [.changes_foundation, rules]
    - !reference [.manual_qa, rules]
    - !reference [.manual_prd, rules]
  script:
    - terraform apply -auto-approve plan.tfplan
