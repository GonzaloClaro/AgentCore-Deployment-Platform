# composition_map.yml
# Mapa de composiciones disponibles en Infra-AgentCore.
# Usado por validate_structure y render_tfvars para validación cruzada.

compositions:
  agent-base:
    requires: [runtime]
    optional: [observability, runtime_iam]
    description: "Mínimo absoluto: runtime + observability. Sin memory. Para agentes stateless."

  agent-chatbot:
    requires: [runtime]
    optional: [observability, runtime_iam]
    description: "Runtime + memory + observability. Para agentes simples sin KB."

  agent-with-kb:
    requires: [runtime, knowledge_base]
    optional: [prompts, observability, runtime_iam]
    description: "Runtime + memory + KB + prompts (SDK). Para agentes con RAG."

  agent-with-tools:
    requires: [runtime, gateway_targets]
    optional: [observability, runtime_iam, gateway_policies]
    description: "Runtime + memory + targets en gateways default. Para agentes que usan tools externas."

  mcp-server:
    requires: [runtime, gateway_targets]
    optional: [oauth_provider, observability, runtime_iam, gateway_policies]
    description: "MCP server detrás de un gateway con autorización (3LO/2LO/M2M)."

  tool-lambda:
    requires: [runtime, gateway_targets]
    optional: []
    description: "Tool desplegada como Lambda + registrada como gateway target. Independiente del runtime."

  gateway-deploy:
    requires: []
    optional: [gateway_targets, gateway_policies]
    description: "Gateway custom standalone (sin runtime). Para capabilities con policy engine aislado."
