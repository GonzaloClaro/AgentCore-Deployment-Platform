spec:
  inputs:
    job_name:
      description: "Nombre del job en el pipeline consumidor"
    stage:
      description: "Stage donde correrá el job"
      default: "validate"
    image_runner:
      description: "Imagen Docker con Python"
      default: ""
    manifest_path:
      description: "Path al manifest.yaml del workload"
    infra_repo_path:
      description: "Path GitLab del repo Infra-AgentCore (para validar que composition referenciada existe)"
      default: "iac/AgentCore/infra-agentcore"
    infra_ref:
      description: "Tag/branch de Infra-AgentCore a validar contra"
      default: "main"
    composition_map_path:
      description: "Path al composition_map.yml dentro de los config_files"
      default: "config_files/render_tfvars/composition_map.yml"
---
include:
  - local: templates/includes/base/base_dominio_components.yml
  - local: templates/includes/base/pull_python_scripts_dominio.yml
  - local: templates/includes/base/pull_config_files_dominio.yml

"$[[ inputs.job_name ]]":
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image_runner ]]
  variables:
    COMPONENT_PY: validate_structure
    ACTION: validate
    MANIFEST_PATH: $[[ inputs.manifest_path ]]
    INFRA_REPO_PATH: $[[ inputs.infra_repo_path ]]
    INFRA_REF: $[[ inputs.infra_ref ]]
    COMPOSITION_MAP_PATH: $[[ inputs.composition_map_path ]]
  script:
    - !reference [.export_meta, script]
    - !reference [.python_setup, script]
    - !reference [.pull_python_scripts, script]
    - !reference [.pull_config_files, script]
    - python python_scripts/$COMPONENT_PY/$ACTION.py
  artifacts:
    when: always
    paths:
      - validation_report.json
    expire_in: 30 days
