# pull_config_files_dominio.yml
# Descarga al runner del Compose los YAML/JSON de config_files/ del componente.
# Mismo patrón que pull_python_scripts pero apuntando al subdir config_files/.

.pull_config_files:
  script:
    - |
      COMPONENT_REPO_PATH="${COMPONENT_REPO_PATH:-Componentes/agentcore}"
      COMPONENT_REF="${COMPONENT_REF:-main}"
      mkdir -p config_files
      echo "[pull] descargando config_files/ desde $COMPONENT_REPO_PATH@$COMPONENT_REF"
      ENCODED=$(python -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1], safe=''))" "$COMPONENT_REPO_PATH")
      curl --fail --silent --show-error \
        --header "PRIVATE-TOKEN: $GITLAB_TOKEN_READ_API" \
        "https://${CI_SERVER_HOST}/api/v4/projects/${ENCODED}/repository/archive.tar.gz?sha=${COMPONENT_REF}&path=config_files" \
        -o /tmp/config.tar.gz
      tar -xzf /tmp/config.tar.gz -C config_files --strip-components=2
      echo "[pull] config_files descargados:"
      find config_files -maxdepth 2 -type f
