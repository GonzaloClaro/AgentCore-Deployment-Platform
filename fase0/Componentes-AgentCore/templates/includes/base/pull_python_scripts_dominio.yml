# pull_python_scripts_dominio.yml
# Descarga al runner del Compose los scripts Python de src/ del componente.
# Requiere CI variable GITLAB_TOKEN_READ_API (project/group token con scope read_api).

.pull_python_scripts:
  script:
    - |
      COMPONENT_REPO_PATH="${COMPONENT_REPO_PATH:-Componentes/agentcore}"
      COMPONENT_REF="${COMPONENT_REF:-main}"
      mkdir -p python_scripts
      echo "[pull] descargando src/ desde $COMPONENT_REPO_PATH@$COMPONENT_REF"
      ENCODED=$(python -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1], safe=''))" "$COMPONENT_REPO_PATH")
      curl --fail --silent --show-error \
        --header "PRIVATE-TOKEN: $GITLAB_TOKEN_READ_API" \
        "https://${CI_SERVER_HOST}/api/v4/projects/${ENCODED}/repository/archive.tar.gz?sha=${COMPONENT_REF}&path=src" \
        -o /tmp/src.tar.gz
      tar -xzf /tmp/src.tar.gz -C python_scripts --strip-components=2
      echo "[pull] estructura descargada:"
      find python_scripts -maxdepth 2 -type d
