# base_dominio_components.yml
# Bloques !reference compartidos por todos los componentes del dominio agentcore.
# Se incluye en cada templates/<subdominio>/template.yml.

.aws_auth:
  script:
    - |
      if [ -z "$AWS_ROLE_ARN" ]; then
        echo "[base] AWS_ROLE_ARN no definido; salteando assume-role"
      else
        echo "[base] assume-role $AWS_ROLE_ARN"
        CREDS=$(aws sts assume-role-with-web-identity \
          --role-arn "$AWS_ROLE_ARN" \
          --role-session-name "gitlab-${CI_JOB_ID}" \
          --web-identity-token "$CI_JOB_JWT_V2" \
          --duration-seconds 3600 --output json)
        export AWS_ACCESS_KEY_ID=$(echo "$CREDS" | jq -r .Credentials.AccessKeyId)
        export AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | jq -r .Credentials.SecretAccessKey)
        export AWS_SESSION_TOKEN=$(echo "$CREDS" | jq -r .Credentials.SessionToken)
        aws sts get-caller-identity
      fi

.python_setup:
  script:
    - python --version
    - pip install --quiet --no-cache-dir -r python_scripts/requirements.txt || true

.export_meta:
  script:
    - echo "[base] CI_PROJECT_PATH=$CI_PROJECT_PATH"
    - echo "[base] CI_COMMIT_BRANCH=$CI_COMMIT_BRANCH"
    - echo "[base] CI_COMMIT_SHORT_SHA=$CI_COMMIT_SHORT_SHA"
    - echo "[base] ENVIRONMENT=$ENVIRONMENT"
