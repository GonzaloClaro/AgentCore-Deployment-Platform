# Manifest template — fase 0
# Schema simplificado: solo zip mode, sin Docker, sin tools, sin gateways.
# Para agentes con KB usar composition agent-with-kb-zip; sino agent-base-zip.

apiVersion: agentcore.io/v1
kind: Agent

metadata:
  name: hello-agent                     # kebab-case, único en el ambiente
  capability: platform-test             # nombre del equipo / dominio
  owner: gonzaloclarom@gmail.com        # email del owner técnico

spec:
  # Una de las 2 composiciones disponibles en fase 0:
  #   - agent-base-zip       → runtime + observability (más simple)
  #   - agent-with-kb-zip    → runtime + memory + knowledge_base + observability
  composition: agent-base-zip

  runtime:
    entrypoint: main.py                 # archivo del zip que arranca el agente
    runtime_version: PYTHON_3_13        # versión Python soportada por AgentCore
    env:                                # env vars adicionales del agente
      LOG_LEVEL: INFO

  # Modelos LLM que el agente puede invocar via Bedrock Converse API.
  # Cada modelo se inyecta como env var con prefijo del alias:
  #   PRIMARY_MODEL_ID, PRIMARY_MODEL_PROVIDER, PRIMARY_MODEL_REGION
  models:
    - alias: PRIMARY
      provider: bedrock
      model_id: amazon.nova-micro-v1:0
      region: us-east-1

  # Solo para agent-with-kb-zip: configuración de Memory + KB
  # memory:
  #   strategy: summarization           # summarization | semantic | user-preference | none
  # knowledge_base:
  #   sources:
  #     - name: docs
  #       bucket_arn: arn:aws:s3:::my-docs-bucket
  #       inclusion_prefixes: ["docs/"]

  # Prompts versionados en Bedrock Prompt Management (opcional)
  # prompts:
  #   - name: system
  #     file: prompts/system_prompt.yaml

  features:
    enable_observability: true          # CloudWatch logs + dashboard

  tags:
    - platform-test
    - fase-0
