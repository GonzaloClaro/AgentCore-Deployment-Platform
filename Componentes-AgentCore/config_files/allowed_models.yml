# allowed_models.yml — whitelist gobernada de modelos permitidos por la organización.
#
# Cualquier modelo declarado en spec.models[] del manifest debe estar en esta lista.
# Para AGREGAR un modelo nuevo:
#   1. PR a este archivo con justificación en la descripción.
#   2. Review de arquitectura + InfoSec + FinOps.
#   3. Una vez merged, el modelo queda disponible para todos los workloads.
#
# La lista está dividida por ambiente: dev permite más para experimentación;
# qa y prd solo permiten modelos aprobados.

bedrock:
  # Modelos Anthropic (Claude family)
  - id: "anthropic.claude-3-5-sonnet-20241022-v2:0"
    display_name: "Claude 3.5 Sonnet (v2)"
    environments: [dev, qa, prd]
    notes: "Default recomendado. Balance costo/calidad."

  - id: "anthropic.claude-3-5-haiku-20241022-v1:0"
    display_name: "Claude 3.5 Haiku"
    environments: [dev, qa, prd]
    notes: "Ligero, baja latencia. Para tools/clasificadores."

  - id: "anthropic.claude-3-opus-20240229-v1:0"
    display_name: "Claude 3 Opus"
    environments: [dev, qa]
    notes: "Calidad alta, costo alto. Limitado a QA por costo. Pedir aprobación FinOps para PRD."

  - id: "anthropic.claude-3-haiku-20240307-v1:0"
    display_name: "Claude 3 Haiku (legacy)"
    environments: [dev, qa, prd]
    notes: "Modelo más económico. Para tools simples."

  # Modelos Amazon (Titan family)
  - id: "amazon.titan-text-premier-v1:0"
    display_name: "Titan Text Premier"
    environments: [dev, qa, prd]
    notes: "Alternativa Amazon. Sin costo de cross-region routing si la cuenta está en us-east-1."

  - id: "amazon.titan-embed-text-v2:0"
    display_name: "Titan Embeddings v2"
    environments: [dev, qa, prd]
    notes: "Solo para embeddings (KB), no para inferencia de texto."

  # Modelos Meta (Llama family)
  - id: "meta.llama3-2-90b-instruct-v1:0"
    display_name: "Llama 3.2 90B Instruct"
    environments: [dev, qa]
    notes: "Open-weight. Solo dev/qa hasta validar fitness en use cases de la organización."

  # Cross-region inference profiles (recomendado para PRD por throughput garantizado)
  - id: "us.anthropic.claude-3-5-sonnet-20241022-v2:0"
    display_name: "Claude 3.5 Sonnet (US cross-region inference)"
    environments: [qa, prd]
    notes: "Cross-region inference profile. Mayor throughput. ID con prefijo 'us.' indica cross-region."

azure:
  # OpenAI family via Azure
  - id: "gpt-4o"
    display_name: "GPT-4o"
    environments: [dev, qa, prd]
    notes: "Para casos donde la org tiene contrato Azure y/o data residency requirement."

  - id: "gpt-4o-mini"
    display_name: "GPT-4o mini"
    environments: [dev, qa, prd]
    notes: "Equivalente económico de gpt-4o."

  - id: "gpt-4-turbo"
    display_name: "GPT-4 Turbo"
    environments: [dev, qa]
    notes: "Legacy. Recomendado migrar a gpt-4o."

# Política de cambios:
#   - Quitar un modelo de prd: requiere comunicar a workloads consumidores con 30 días.
#   - Agregar un modelo a prd: PR + review + 1 sprint de soak en qa antes de promover.
#   - Cambiar `environments: [dev]` → `[dev, qa]`: permitido con review simple.
