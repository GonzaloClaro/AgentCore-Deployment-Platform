# common.yml — convenciones compartidas del dominio agentcore.

naming:
  ecr_repo_pattern: "agentcore-{kind}-{capability}-{name}"      # kind: agents|mcp|tools
  s3_artifacts_bucket_pattern: "artifacts-{env}-agentcore-{kind}"
  secret_name_pattern: "agentcore/{env}/{purpose}/{name}"
  prompt_name_pattern: "{env}-{capability}-{workload}-{prompt_name}"

tags_aws_default:
  managed-by: "agentcore-pipeline"
  domain: "agentcore"

regions:
  default: "us-east-1"

gateways_default:
  - name: "oauth-3lo"
    description: "Human-machine OAuth 3LO"
  - name: "oauth-2lo"
    description: "Machine-to-machine OAuth 2LO"
  - name: "sigv4-m2m"
    description: "Machine-to-machine SigV4"

memory_strategies:
  - "summarization"
  - "semantic"
  - "user-preference"
  - "none"
