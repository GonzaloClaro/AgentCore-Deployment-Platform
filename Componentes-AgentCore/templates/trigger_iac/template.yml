spec:
  inputs:
    job_name:
      description: "Nombre del job en el pipeline consumidor"
    stage:
      description: "Stage donde correrá el job"
      default: "deploy"
    image_runner:
      description: "Imagen Docker con curl"
      default: ""
    target_project:
      description: "Path GitLab del deployable (ej: iac/AgentCore/agentcore-dev)"
    target_ref:
      description: "Branch/tag del deployable a disparar"
      default: "main"
    infra_ref:
      description: "Tag de Infra-AgentCore con módulos+composiciones"
      default: "main"
    tfvars_artifact:
      description: "Nombre del archivo tfvars a propagar (artifact upstream)"
      default: "terraform.auto.tfvars.json"
    composition_artifact:
      description: "Nombre del archivo composition (artifact upstream)"
      default: "composition_name.txt"
    environment:
      description: "Ambiente destino"
      default: "dev"
---
include:
  - local: templates/includes/base/base_dominio_components.yml
  - local: templates/includes/base/pull_python_scripts_dominio.yml

"$[[ inputs.job_name ]]":
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image_runner ]]
  variables:
    COMPONENT_PY: trigger_iac
    ACTION: trigger
    TARGET_PROJECT: $[[ inputs.target_project ]]
    TARGET_REF: $[[ inputs.target_ref ]]
    INFRA_REF: $[[ inputs.infra_ref ]]
    TFVARS_ARTIFACT: $[[ inputs.tfvars_artifact ]]
    COMPOSITION_ARTIFACT: $[[ inputs.composition_artifact ]]
    ENVIRONMENT: $[[ inputs.environment ]]
  script:
    - !reference [.export_meta, script]
    - !reference [.python_setup, script]
    - !reference [.pull_python_scripts, script]
    - python python_scripts/$COMPONENT_PY/$ACTION.py
