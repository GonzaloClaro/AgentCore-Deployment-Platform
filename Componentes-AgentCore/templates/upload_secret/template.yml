spec:
  inputs:
    job_name:
      description: "Nombre del job en el pipeline consumidor"
    stage:
      description: "Stage donde correrá el job"
      default: "secrets"
    image_runner:
      description: "Imagen Docker con aws-cli"
      default: ""
    secret_name:
      description: "Nombre del secreto en Secrets Manager (sin prefijo de cuenta)"
    value_var:
      description: "Nombre de la CI variable (masked) cuyo valor se sube"
    kms_key_id:
      description: "KMS Key ID/ARN para cifrar el secreto"
      default: "alias/agentcore-secrets"
    environment:
      description: "Ambiente destino"
      default: "dev"
---
include:
  - local: templates/includes/base/base_dominio_components.yml
  - local: templates/includes/base/pull_python_scripts_dominio.yml

"$[[ inputs.job_name ]]":
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image_runner ]]
  variables:
    COMPONENT_PY: upload_secret
    ACTION: upload
    SECRET_NAME: $[[ inputs.secret_name ]]
    VALUE_VAR_NAME: $[[ inputs.value_var ]]
    KMS_KEY_ID: $[[ inputs.kms_key_id ]]
    ENVIRONMENT: $[[ inputs.environment ]]
  script:
    - !reference [.export_meta, script]
    - !reference [.python_setup, script]
    - !reference [.aws_auth, script]
    - !reference [.pull_python_scripts, script]
    - python python_scripts/$COMPONENT_PY/$ACTION.py
  artifacts:
    paths:
      - secret_meta.json
    expire_in: 1 day
