spec:
  inputs:
    job_name:
      description: "Nombre del job en el pipeline consumidor"
    stage:
      description: "Stage donde correrá el job"
      default: ".pre"   # típicamente .pre (start) o .post (end) — corren antes/después de todos
    image_runner:
      description: "Imagen Docker con boto3"
      default: ""
    action:
      description: "emit_start | emit_end | emit_event"
      default: "emit_event"
    event_name:
      description: "Nombre del evento (solo para action=emit_event)"
      default: "pipeline.event"
    event_status:
      description: "success | failure | running"
      default: "success"
    event_metadata:
      description: "JSON string con metadata adicional"
      default: "{}"
    log_group:
      description: "CloudWatch Log Group de destino. Default: /agentcore/pipeline-telemetry"
      default: "/agentcore/pipeline-telemetry"
    environment:
      description: "Ambiente (dev/qa/prd)"
      default: "dev"
---
include:
  - local: templates/includes/base/base_dominio_components.yml
  - local: templates/includes/base/pull_python_scripts_dominio.yml

"$[[ inputs.job_name ]]":
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image_runner ]]
  variables:
    COMPONENT_PY: pipeline_telemetry
    ACTION: $[[ inputs.action ]]
    EVENT_NAME: $[[ inputs.event_name ]]
    EVENT_STATUS: $[[ inputs.event_status ]]
    EVENT_METADATA: $[[ inputs.event_metadata ]]
    LOG_GROUP: $[[ inputs.log_group ]]
    ENVIRONMENT: $[[ inputs.environment ]]
  script:
    - !reference [.export_meta, script]
    - !reference [.python_setup, script]
    - !reference [.aws_auth, script]
    - !reference [.pull_python_scripts, script]
    - python python_scripts/$COMPONENT_PY/emit.py
  artifacts:
    when: always
    reports:
      dotenv: telemetry.env       # propaga TRACE_ID al resto del pipeline
    paths:
      - telemetry_event.json
    expire_in: 30 days
