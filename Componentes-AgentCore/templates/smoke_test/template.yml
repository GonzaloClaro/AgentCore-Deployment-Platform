spec:
  inputs:
    job_name:
      description: "Nombre del job en el pipeline consumidor"
    stage:
      description: "Stage donde correrá el job"
      default: "smoke"
    image_runner:
      description: "Imagen Docker con boto3"
      default: ""
    runtime_arn:
      description: "ARN del agent runtime (output de Terraform)"
    payload:
      description: "JSON payload a enviar al endpoint /invocations o /ping"
      default: '{"prompt":"ping"}'
    expect_status:
      description: "Status code HTTP esperado"
      default: "200"
    environment:
      description: "Ambiente destino"
      default: "dev"
---
include:
  - local: templates/includes/base/base_dominio_components.yml
  - local: templates/includes/base/pull_python_scripts_dominio.yml

"$[[ inputs.job_name ]]":
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image_runner ]]
  variables:
    COMPONENT_PY: smoke_test
    ACTION: smoke
    RUNTIME_ARN: $[[ inputs.runtime_arn ]]
    PAYLOAD: $[[ inputs.payload ]]
    EXPECT_STATUS: $[[ inputs.expect_status ]]
    ENVIRONMENT: $[[ inputs.environment ]]
  script:
    - !reference [.export_meta, script]
    - !reference [.python_setup, script]
    - !reference [.aws_auth, script]
    - !reference [.pull_python_scripts, script]
    - python python_scripts/$COMPONENT_PY/$ACTION.py
  artifacts:
    when: always
    paths:
      - smoke_report.json
    expire_in: 7 days
